<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Portfolio Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #a3a3a3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        
        .private-mask {
            filter: blur(8px);
            opacity: 0.25;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6 sm:p-12 selection:bg-emerald-500/30 selection:text-emerald-300">

    <main class="max-w-xl w-full mx-auto my-auto space-y-8">
        
        <header class="text-center space-y-2">
            <div class="flex items-center justify-center space-x-2">
                <div id="privacy-toggle" class="group/toggle inline-flex items-center space-x-2 cursor-pointer select-none py-1.5 px-4 bg-neutral-950/40 hover:bg-white/5 rounded-l-full transition-all duration-150 border border-white/5 hover:border-white/10 shadow-sm">
                    <p class="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-semibold group-hover/toggle:text-neutral-300 transition-colors duration-150">Total Net Balance</p>
                    <span id="privacy-status-label" class="text-xs font-bold tracking-wide font-mono text-neutral-400 group-hover/toggle:text-emerald-400 transition-colors duration-150">[Hide]</span>
                </div>
                <button id="manual-refresh-btn" class="group/refresh inline-flex items-center space-x-1.5 cursor-pointer select-none py-1.5 px-4 bg-neutral-950/40 hover:bg-emerald-500/10 text-neutral-500 hover:text-emerald-400 font-mono text-xs font-bold rounded-r-full transition-all duration-150 border-y border-r border-white/5 hover:border-emerald-500/20 shadow-sm">
                    <span id="sync-icon" class="inline-block">↻</span>
                    <span id="sync-text">[Sync Group]</span>
                </button>
            </div>
            
            <h1 id="total-balance" class="text-5xl sm:text-6xl font-normal tracking-tight text-white transition-all duration-200 select-none">$0.00</h1>
            
            <div id="macro-tape" class="text-[11px] font-mono text-neutral-600 tracking-wider transition-all duration-300">
                Nasdaq Tech Index (QQQ): <span id="qqq-value" class="text-neutral-500">Awaiting Manual Sync...</span>
            </div>
        </header>

        <section class="bg-neutral-950/40 border border-white/10 shadow-2xl shadow-black/80 rounded-2xl p-5 backdrop-blur-md">
            <form id="asset-form" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="ticker" placeholder="Symbol (e.g., NVDA)" required class="flex-1 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 uppercase tracking-wider placeholder-neutral-600 transition-all duration-200">
                <input type="number" id="shares" placeholder="Shares" required min="1" step="1" class="w-full sm:w-28 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 placeholder-neutral-600 transition-all duration-200">
                <button type="submit" id="submit-btn" class="bg-emerald-500 text-neutral-950 font-semibold text-sm rounded-xl px-6 py-3 hover:bg-emerald-400 transition-all duration-200 shadow-lg shadow-emerald-500/10 active:scale-[0.98]">Add Asset</button>
            </form>
            <p id="error-msg" class="text-xs text-rose-400 mt-3 font-medium tracking-wide hidden bg-rose-500/10 border border-rose-500/20 p-2.5 rounded-xl text-center animate-pulse"></p>
        </section>

        <section class="bg-neutral-950/20 border border-white/5 rounded-2xl px-6 py-4 backdrop-blur-sm">
            <div class="flex justify-between items-center pb-2 border-b border-white/5 text-[10px] uppercase tracking-wider font-semibold text-neutral-500 font-mono">
                <span>Asset & Allocation</span>
                <span>Total Value</span>
