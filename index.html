<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #a3a3a3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6 sm:p-12 selection:bg-emerald-500/30 selection:text-emerald-300">

    <main class="max-w-xl w-full mx-auto my-auto space-y-10">

        <header class="text-center space-y-1.5">
            <p class="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-semibold">Total Net Balance</p>
            <h1 id="total-balance" class="text-5xl sm:text-6xl font-normal tracking-tight text-white">$0</h1>
        </header>

        <section class="bg-neutral-950/40 border border-white/10 shadow-2xl shadow-black/80 rounded-2xl p-5 backdrop-blur-md">
            <form id="asset-form" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="ticker" placeholder="Symbol (e.g., TSLA)" required class="flex-1 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 uppercase tracking-wider placeholder-neutral-600 transition-all duration-200">
                <input type="number" id="shares" placeholder="Shares" required min="1" step="1" class="w-full sm:w-28 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 placeholder-neutral-600 transition-all duration-200">
                <button type="submit" class="bg-emerald-500 text-neutral-950 font-semibold text-sm rounded-xl px-6 py-3 hover:bg-emerald-400 transition-all duration-200 shadow-lg shadow-emerald-500/10 active:scale-[0.98]">Add Asset</button>
            </form>
            <p id="error-msg" class="text-xs text-rose-400 mt-3 font-medium tracking-wide hidden"></p>
        </section>

        <section class="bg-neutral-950/20 border border-white/5 rounded-2xl px-6 py-2 backdrop-blur-sm">
            <div id="portfolio-list" class="divide-y divide-white/5"></div>
        </section>

    </main>

    <footer class="text-center text-[11px] text-neutral-600 tracking-[0.1em] uppercase pt-12">
        <p id="as-of-time" class="font-medium">As of: No data fetched yet</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY9RtBtL5oSpJLJXoe8SMCEZfNB5HDND8",
            authDomain: "simple-stock-tracker.firebaseapp.com",
            databaseURL: "https://simple-stock-tracker-default-rtdb.firebaseio.com/",
            projectId: "simple-stock-tracker",
            storageBucket: "simple-stock-tracker.firebasestorage.app",
            messagingSenderId: "563561297938",
            appId: "1:563561297938:web:db05227fa9c89b09f340cb",
            measurementId: "G-1HQJKJSMQ7"
        };

        const ALPHA_VANTAGE_KEY = "ATLY8E0ZH2SYPTOA";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const portfolioRef = ref(db, 'portfolio');

        let portfolio = {};

        const assetForm = document.getElementById('asset-form');
        const tickerInput = document.getElementById('ticker');
        const sharesInput = document.getElementById('shares');
        const portfolioList = document.getElementById('portfolio-list');
        const totalBalanceDisplay = document.getElementById('total-balance');
        const asOfTimeDisplay = document.getElementById('as-of-time');
        const errorMsg = document.getElementById('error-msg');

        onValue(portfolioRef, (snapshot) => {
            const data = snapshot.val();
            portfolio = data || {};
            renderPortfolio();
        });

        setInterval(refreshPrices, 60000);

        assetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const ticker = tickerInput.value.trim().toUpperCase();
            const shares = parseInt(sharesInput.value, 10);
            if (!ticker || isNaN(shares)) return;

            const existingShares = portfolio[ticker] ? portfolio[ticker].shares : 0;
            const newSharesTotal = existingShares + shares;

            try {
                const price = await fetchStockPrice(ticker);
                if (price) {
                    await set(ref(db, 'portfolio/' + ticker), {
                        shares: newSharesTotal,
                        price: price
                    });
                    assetForm.reset();
                } else {
                    showError(`Could not find valid price data for "${ticker}".`);
                }
            } catch (err) {
                showError("API limit encountered. Please wait a moment.");
            }
        });

        async function fetchStockPrice(ticker) {
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${ALPHA_VANTAGE_KEY}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                updateTimestamp();
                return parseFloat(data["Global Quote"]["05. price"]);
            }
            return null;
        }

        async function refreshPrices() {
            const tickers = Object.keys(portfolio);
            for (let ticker of tickers) {
                try {
                    const freshPrice = await fetchStockPrice(ticker);
                    if (freshPrice) {
                        await set(ref(db, `portfolio/${ticker}/price`), freshPrice);
                    }
                    await new Promise(res => setTimeout(res, 1000));
                } catch (e) {
                    console.error(e);
                }
            }
        }

        window.removeItem = function(ticker) {
            remove(ref(db, 'portfolio/' + ticker));
        };

        function renderPortfolio() {
            portfolioList.innerHTML = '';
            let grandTotal = 0;

            const portfolioArray = Object.keys(portfolio).map(ticker => {
                return {
                    ticker: ticker,
                    shares: portfolio[ticker].shares,
                    price: portfolio[ticker].price,
                    totalValue: portfolio[ticker].shares * portfolio[ticker].price
                };
            });

            if (portfolioArray.length === 0) {
                portfolioList.innerHTML = `<p class="text-center text-xs text-neutral-600 tracking-wide py-6">No assets tracked</p>`;
                totalBalanceDisplay.textContent = '$0';
                return;
            }

            portfolioArray.sort((a, b) => b.totalValue - a.totalValue);

            portfolioArray.forEach(item => {
                grandTotal += item.totalValue;

                const row = document.createElement('div');
                row.className = "flex items-center justify-between py-4 group transition-all duration-150";
                row.innerHTML = `
                    <div class="flex flex-col space-y-0.5">
                        <span class="text-sm font-medium tracking-wide text-neutral-200">${item.ticker}</span>
                        <span class="text-xs text-neutral-500">${item.shares.toLocaleString()} shares</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right flex flex-col space-y-0.5">
                            <span class="text-sm font-medium text-white">$${Math.round(item.totalValue).toLocaleString()}</span>
                            <span class="text-[11px] text-neutral-500 font-mono">$${Math.round(item.price).toLocaleString()} / share</span>
                        </div>
                        <button onclick="removeItem('${item.ticker}')" class="text-neutral-600 hover:text-rose-400 text-xs px-1 opacity-0 group-hover:opacity-100 transition-all duration-150 transform translate-x-1 group-hover:translate-x-0">✕</button>
                    </div>
                `;
                portfolioList.appendChild(row);
            });

            totalBalanceDisplay.textContent = `$${Math.round(grandTotal).toLocaleString()}`;
        }

        function updateTimestamp() {
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const timestampStr = `As of: ${now.toLocaleString('en-US', options)}`;
            asOfTimeDisplay.textContent = timestampStr;
            set(ref(db, 'lastUpdated'), timestampStr);
        }

        onValue(ref(db, 'lastUpdated'), (snapshot) => {
            if (snapshot.exists()) asOfTimeDisplay.textContent = snapshot.val();
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
