<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Portfolio Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #a3a3a3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        
        .private-mask {
            filter: blur(8px);
            opacity: 0.25;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6 sm:p-12 selection:bg-emerald-500/30 selection:text-emerald-300">

    <main class="max-w-xl w-full mx-auto my-auto space-y-8">
        
        <header class="text-center space-y-2">
            <div class="flex items-center justify-center space-x-2">
                <div id="privacy-toggle" class="group/toggle inline-flex items-center space-x-2 cursor-pointer select-none py-1.5 px-4 bg-neutral-950/40 hover:bg-white/5 rounded-l-full transition-all duration-150 border border-white/5 hover:border-white/10 shadow-sm">
                    <p class="text-[11px] uppercase tracking-[0.2em] text-neutral-500 font-semibold group-hover/toggle:text-neutral-300 transition-colors duration-150">Total Net Balance</p>
                    <span id="privacy-status-label" class="text-xs font-bold tracking-wide font-mono text-neutral-400 group-hover/toggle:text-emerald-400 transition-colors duration-150">[Hide]</span>
                </div>
                <button id="manual-refresh-btn" class="group/refresh inline-flex items-center space-x-1.5 cursor-pointer select-none py-1.5 px-4 bg-neutral-950/40 hover:bg-emerald-500/10 text-neutral-500 hover:text-emerald-400 font-mono text-xs font-bold rounded-r-full transition-all duration-150 border-y border-r border-white/5 hover:border-emerald-500/20 shadow-sm">
                    <span id="sync-icon" class="inline-block">↻</span>
                    <span id="sync-text">[Sync Group]</span>
                </button>
            </div>
            
            <h1 id="total-balance" class="text-5xl sm:text-6xl font-normal tracking-tight text-white transition-all duration-200 select-none">$0.00</h1>
            
            <div id="macro-tape" class="text-[11px] font-mono text-neutral-600 tracking-wider transition-all duration-300">
                Nasdaq Tech Index (QQQ): <span id="qqq-value" class="text-neutral-500">Awaiting Manual Sync...</span>
            </div>
        </header>

        <section class="border-b border-white/5 pb-1">
            <div class="flex items-center justify-between">
                <div id="tabs-container" class="flex items-center space-x-1 overflow-x-auto no-scrollbar scroll-smooth pr-4"></div>
                <button id="add-tab-btn" class="text-xs font-mono font-bold bg-neutral-950/60 hover:bg-white/5 border border-white/5 hover:border-white/10 px-3 py-1.5 rounded-lg text-neutral-400 hover:text-emerald-400 transition-all active:scale-[0.95] flex-shrink-0">
                    + New Tab
                </button>
            </div>
        </section>

        <section class="bg-neutral-950/40 border border-white/10 shadow-2xl shadow-black/80 rounded-2xl p-5 backdrop-blur-md">
            <form id="asset-form" class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="ticker" placeholder="Symbol (e.g., NVDA)" required class="flex-1 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 uppercase tracking-wider placeholder-neutral-600 transition-all duration-200">
                <input type="number" id="shares" placeholder="Shares" required min="1" step="1" class="w-full sm:w-28 bg-neutral-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-white/20 placeholder-neutral-600 transition-all duration-200">
                <button type="submit" id="submit-btn" class="bg-emerald-500 text-neutral-950 font-semibold text-sm rounded-xl px-6 py-3 hover:bg-emerald-400 transition-all duration-200 shadow-lg shadow-emerald-500/10 active:scale-[0.98]">Add Asset</button>
            </form>
            <p id="error-msg" class="text-xs text-rose-400 mt-3 font-medium tracking-wide hidden bg-rose-500/10 border border-rose-500/20 p-2.5 rounded-xl text-center animate-pulse"></p>
        </section>

        <section class="bg-neutral-950/20 border border-white/5 rounded-2xl px-6 py-4 backdrop-blur-sm">
            <div class="flex justify-between items-center pb-2 border-b border-white/5 text-[10px] uppercase tracking-wider font-semibold text-neutral-500 font-mono">
                <span id="allocation-header-title">Asset & Allocation</span>
                <span>Total Value</span>
            </div>
            
            <div id="portfolio-list" class="divide-y divide-white/5"></div>
        </section>
        
    </main>

    <footer class="text-center text-[11px] text-neutral-600 tracking-[0.1em] uppercase pt-12">
        <p id="as-of-time" class="font-medium">As of: No data fetched yet</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAY9RtBtL5oSpJLJXoe8SMCEZfNB5HDND8",
            authDomain: "simple-stock-tracker.firebaseapp.com",
            databaseURL: "https://simple-stock-tracker-default-rtdb.firebaseio.com/",
            projectId: "simple-stock-tracker",
            storageBucket: "simple-stock-tracker.firebasestorage.app",
            messagingSenderId: "563561297938",
            appId: "1:563561297938:web:db05227fa9c89b09f340cb",
            measurementId: "G-1HQJKJSMQ7"
        };

        const ALPHA_VANTAGE_KEY = "ATLY8E0ZH2SYPTOA";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeTab = localStorage.getItem('active_portfolio_tab') || 'Main Portfolio';
        let customTabsList = JSON.parse(localStorage.getItem('portfolio_tabs_list')) || ['Main Portfolio', 'Tech Growth'];
        let portfolio = {};
        let isPrivateMode = localStorage.getItem('privacy_shutter_enabled') === 'true';

        const assetForm = document.getElementById('asset-form');
        const tickerInput = document.getElementById('ticker');
        const sharesInput = document.getElementById('shares');
        const portfolioList = document.getElementById('portfolio-list');
        const totalBalanceDisplay = document.getElementById('total-balance');
        const asOfTimeDisplay = document.getElementById('as-of-time');
        const qqqValueDisplay = document.getElementById('qqq-value');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const privacyToggle = document.getElementById('privacy-toggle');
        const privacyStatusLabel = document.getElementById('privacy-status-label');
        const manualRefreshBtn = document.getElementById('manual-refresh-btn');
        const syncIcon = document.getElementById('sync-icon');
        const syncText = document.getElementById('sync-text');
        const tabsContainer = document.getElementById('tabs-container');

        // FIXED: Run inside a safe, non-blocking bootstrap architecture
        async function checkAndMigrateLegacyData() {
            try {
                const legacySnapshot = await get(ref(db, 'portfolio'));
                if (legacySnapshot.exists() && legacySnapshot.val() !== null) {
                    const legacyData = legacySnapshot.val();
                    await set(ref(db, 'portfolios/Main Portfolio'), legacyData);
                    await remove(ref(db, 'portfolio'));
                }
            } catch (e) {
                console.error("Migration handling skip: ", e);
            }
        }

        let currentDataListener = null;
        let currentTimestampListener = null;

        function attachDatabaseListener() {
            if (currentDataListener) currentDataListener();
            if (currentTimestampListener) currentTimestampListener();
            
            const relativeRef = ref(db, `portfolios/${activeTab}`);
            currentDataListener = onValue(relativeRef, (snapshot) => {
                portfolio = snapshot.val() || {};
                renderPortfolio();
            });

            currentTimestampListener = onValue(ref(db, `lastUpdated_${activeTab}`), (snapshot) => {
                if (snapshot.exists()) asOfTimeDisplay.textContent = snapshot.val();
                else asOfTimeDisplay.textContent = "As of: Needs initial sync";
            });
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            customTabsList.forEach(tabName => {
                const tab = document.createElement('button');
                const isActive = tabName === activeTab;
                
                tab.className = `text-xs font-mono font-medium px-3.5 py-1.5 rounded-lg border transition-all flex-shrink-0 select-none ${
                    isActive 
                    ? 'bg-white/5 border-white/10 text-white font-bold' 
                    : 'bg-transparent border-transparent text-neutral-500 hover:text-neutral-300 hover:bg-neutral-900/40'
                }`;
                tab.textContent = tabName;
                
                tab.addEventListener('click', () => {
                    activeTab = tabName;
                    localStorage.setItem('active_portfolio_tab', activeTab);
                    renderTabs();
                    attachDatabaseListener();
                });
                
                tab.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (customTabsList.length <= 1) return;
                    if (confirm(`Delete the tab group "${tabName}" entirely?`)) {
                        remove(ref(db, `portfolios/${tabName}`));
                        remove(ref(db, `lastUpdated_${tabName}`));
                        customTabsList = customTabsList.filter(t => t !== tabName);
                        localStorage.setItem('portfolio_tabs_list', JSON.stringify(customTabsList));
                        if (activeTab === tabName) activeTab = customTabsList[0];
                        localStorage.setItem('active_portfolio_tab', activeTab);
                        renderTabs();
                        attachDatabaseListener();
                    }
                });
                
                tabsContainer.appendChild(tab);
            });
        }

        document.getElementById('add-tab-btn').addEventListener('click', () => {
            const newName = prompt("Enter a unique name for your new asset tab:");
            if (!newName) return;
            const cleanName = newName.trim();
            // Core database safety checks
            if (cleanName === '' || customTabsList.includes(cleanName) || cleanName.includes('.') || cleanName.includes('#') || cleanName.includes('$') || cleanName.includes('[') || cleanName.includes(']')) {
                alert("Invalid or duplicate portfolio tab name. Avoid special database characters.");
                return;
            }
            customTabsList.push(cleanName);
            localStorage.setItem('portfolio_tabs_list', JSON.stringify(customTabsList));
            activeTab = cleanName;
            localStorage.setItem('active_portfolio_tab', activeTab);
            renderTabs();
            attachDatabaseListener();
        });

        // FIXED: Safe execution entry point completely eliminates top-level freezing risks
        function bootstrapApp() {
            renderTabs();
            attachDatabaseListener();
            
            // Perform data lookups safely in the background
            checkAndMigrateLegacyData();
        }
        
        bootstrapApp();

        manualRefreshBtn.addEventListener('click', () => {
            refreshPrices();
        });

        privacyToggle.addEventListener('click', () => {
            isPrivateMode = !isPrivateMode;
            localStorage.setItem('privacy_shutter_enabled', isPrivateMode);
            renderPortfolio();
        });

        assetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const ticker = tickerInput.value.trim().toUpperCase();
            const shares = parseInt(sharesInput.value, 10);
            if (!ticker || isNaN(shares)) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "Fetching...";

            const existingShares = portfolio[ticker] ? portfolio[ticker].shares : 0;
            const newSharesTotal = existingShares + shares;

            try {
                const price = await fetchStockPrice(ticker);
                if (price) {
                    await set(ref(db, `portfolios/${activeTab}/${ticker}`), {
                        shares: newSharesTotal,
                        price: price
                    });
                    assetForm.reset();
                }
            } catch (err) {
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Add Asset";
            }
        });

        async function fetchStockPrice(ticker) {
            try {
                const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticker}&apikey=${ALPHA_VANTAGE_KEY}&_=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data["Note"]) {
                    showError("Sync Throttled: Alpha Vantage API limit reached.");
                    return null;
                }

                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    return parseFloat(data["Global Quote"]["05. price"]);
                }
                
                showError(`Symbol "${ticker}" not verified or out of bounds.`);
                return null;
            } catch (err) {
                showError("Network connection error. Failed to reach pricing server.");
                return null;
            }
        }

        async function fetchMacroIndex() {
            try {
                const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=QQQ&apikey=${ALPHA_VANTAGE_KEY}&_=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data["Note"]) {
                    qqqValueDisplay.textContent = "Throttled (Wait 1m)";
                    return;
                }
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    const price = parseFloat(data["Global Quote"]["05. price"]).toFixed(2);
                    const changePercent = data["Global Quote"]["10. change percent"] || "0.00%";
                    const cleanPercent = changePercent.replace('%', '');
                    const isPositive = parseFloat(cleanPercent) >= 0;
                    
                    qqqValueDisplay.className = isPositive ? "text-emerald-400 font-medium" : "text-rose-400 font-medium";
                    qqqValueDisplay.textContent = "$" + price + " (" + (isPositive ? "+" : "") + cleanPercent + "%)";
                }
            } catch (e) {
                qqqValueDisplay.textContent = "Unavailable";
                qqqValueDisplay.className = "text-neutral-600";
            }
        }

        async function refreshPrices() {
            const tickers = Object.keys(portfolio);
            if (tickers.length === 0) {
                await fetchMacroIndex();
                return;
            }

            manualRefreshBtn.disabled = true;
            syncIcon.classList.add('animate-spin');
            totalBalanceDisplay.classList.add('animate-pulse', 'text-emerald-500');
            errorMsg.classList.add('hidden');

            const updatesBatch = {};
            let globalSyncSuccess = true;

            for (let ticker of tickers) {
                syncText.textContent = `[Syncing: ${ticker}...]`;
                try {
                    const freshPrice = await fetchStockPrice(ticker);
                    if (freshPrice) {
                        updatesBatch[`portfolios/${activeTab}/${ticker}/price`] = freshPrice;
                    } else {
                        globalSyncSuccess = false;
                        break; 
                    }
                    await new Promise(res => setTimeout(res, 1800)); 
                } catch (e) {
                    globalSyncSuccess = false;
                    break;
                }
            }
            
            if (globalSyncSuccess && Object.keys(updatesBatch).length > 0) {
                syncText.textContent = `[Finishing...]`;
                await update(ref(db), updatesBatch);
                updateTimestamp();
                await fetchMacroIndex();
            }

            totalBalanceDisplay.classList.remove('animate-pulse', 'text-emerald-500');
            syncIcon.classList.remove('animate-spin');
            syncText.textContent = "[Sync Group]";
            manualRefreshBtn.disabled = false;
        }

        window.removeItem = function(ticker) {
            remove(ref(db, `portfolios/${activeTab}/${ticker}`));
        };

        function getBrandColorClass(string) {
            const colors = [
                'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
                'bg-cyan-500/10 text-cyan-400 border-cyan-500/20',
                'bg-blue-500/10 text-blue-400 border-blue-500/20',
                'bg-indigo-500/10 text-indigo-400 border-indigo-500/20',
                'bg-violet-500/10 text-violet-400 border-violet-500/20',
                'bg-purple-500/10 text-purple-400 border-purple-500/20',
                'bg-fuchsia-500/10 text-fuchsia-400 border-fuchsia-500/20'
            ];
            let hash = 0;
            for (let i = 0; i < string.length; i++) {
                hash = string.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function renderPortfolio() {
            portfolioList.innerHTML = '';
            let grandTotal = 0;
            
            privacyStatusLabel.textContent = isPrivateMode ? "[Show]" : "[Hide]";
            document.getElementById('allocation-header-title').textContent = `${activeTab} Assets`;

            const portfolioArray = Object.keys(portfolio).map(ticker => {
                const totalVal = portfolio[ticker].shares * portfolio[ticker].price;
                grandTotal += totalVal;
                return {
                    ticker: ticker,
                    shares: portfolio[ticker].shares,
                    price: portfolio[ticker].price,
                    totalValue: totalVal
                };
            });

            if (portfolioArray.length === 0) {
                portfolioList.innerHTML = `<p class="text-center text-xs text-neutral-600 tracking-wide py-6">No assets inside "${activeTab}" yet</p>`;
                totalBalanceDisplay.textContent = '$0.00';
                totalBalanceDisplay.classList.remove('private-mask');
                return;
            }

            portfolioArray.sort((a, b) => b.totalValue - a.totalValue);

            portfolioArray.forEach(item => {
                const allocationPercentage = grandTotal > 0 ? ((item.totalValue / grandTotal) * 100).toFixed(1) : "0.0";
                
                const row = document.createElement('div');
                row.className = "flex items-center justify-between py-3.5 group transition-all duration-150";
                
                const identityContainer = document.createElement('div');
                identityContainer.className = "flex items-center space-x-3.5";
                
                const logoIcon = document.createElement('div');
                logoIcon.className = `w-9 h-9 flex items-center justify-center rounded-xl border text-xs font-bold tracking-wide font-mono shadow-sm flex-shrink-0 ${getBrandColorClass(item.ticker)}`;
                logoIcon.textContent = item.ticker.charAt(0);
                
                const dataTextWrapper = document.createElement('div');
                dataTextWrapper.className = "flex flex-col space-y-0.5";
                
                const badgeWrapper = document.createElement('div');
                badgeWrapper.className = "flex items-center space-x-2";
                
                const symbolText = document.createElement('span');
                symbolText.className = "text-sm font-medium tracking-wide text-neutral-200";
                symbolText.textContent = item.ticker;
                
                const allocationBadge = document.createElement('span');
                const isOverConcentrated = parseFloat(allocationPercentage) > 50.0;
                
                allocationBadge.className = isOverConcentrated 
                    ? "text-[10px] bg-amber-500/10 border border-amber-500/30 text-amber-400 px-1.5 py-0.5 rounded-md font-mono font-bold shadow-sm shadow-amber-500/5"
                    : "text-[10px] bg-neutral-900 border border-white/5 text-neutral-400 px-1.5 py-0.5 rounded-md font-mono font-medium";
                
                allocationBadge.textContent = allocationPercentage + "%" + (isOverConcentrated ? " ⚠" : "");
                
                badgeWrapper.appendChild(symbolText);
                badgeWrapper.appendChild(allocationBadge);
                
                const sharesCountText = document.createElement('span');
                sharesCountText.className = "text-xs text-neutral-500";
                sharesCountText.textContent = item.shares.toLocaleString() + " shares";
                
                dataTextWrapper.appendChild(badgeWrapper);
                dataTextWrapper.appendChild(sharesCountText);
                
                identityContainer.appendChild(logoIcon);
                identityContainer.appendChild(dataTextWrapper);
                
                const rightContainer = document.createElement('div');
                rightContainer.className = "flex items-center space-x-4";
                
                const quantitativeWrapper = document.createElement('div');
                quantitativeWrapper.className = "text-right flex flex-col space-y-0.5";
                if (isPrivateMode) quantitativeWrapper.classList.add('private-mask');
                
                const totalAssetValText = document.createElement('span');
                totalAssetValText.className = "text-sm font-medium text-white";
                totalAssetValText.textContent = "$" + item.totalValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                
                const unitPriceLabel = document.createElement('span');
                unitPriceLabel.className = "text-[11px] text-neutral-500 font-mono";
                unitPriceLabel.textContent = "$" + item.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " / share";
                
                quantitativeWrapper.appendChild(totalAssetValText);
                quantitativeWrapper.appendChild(unitPriceLabel);
                
                const deleteActionBtn = document.createElement('button');
                deleteActionBtn.className = "text-neutral-600 hover:text-rose-400 text-xs px-1 opacity-0 group-hover:opacity-100 transition-all duration-150 transform translate-x-1 group-hover:translate-x-0";
                deleteActionBtn.textContent = "✕";
                deleteActionBtn.onclick = function() { window.removeItem(item.ticker); };
                
                rightContainer.appendChild(quantitativeWrapper);
                rightContainer.appendChild(deleteActionBtn);
                
                row.appendChild(identityContainer);
                row.appendChild(rightContainer);
                portfolioList.appendChild(row);
            });

            if (isPrivateMode) {
                totalBalanceDisplay.textContent = "$ ••••••";
                totalBalanceDisplay.classList.add('private-mask');
            } else {
                totalBalanceDisplay.textContent = "$" + grandTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                totalBalanceDisplay.classList.remove('private-mask');
            }
        }

        function updateTimestamp() {
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const timestampStr = "As of: " + now.toLocaleString('en-US', options);
            asOfTimeDisplay.textContent = timestampStr;
            set(ref(db, `lastUpdated_${activeTab}`), timestampStr);
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
